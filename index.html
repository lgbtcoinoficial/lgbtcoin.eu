<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGBTcoin Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <style>
        :root { --accent: #00ff88; }
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #222; max-width: 380px; margin: 50px auto; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; }
        .btn { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 20px; border-radius: 20px; display: none; font-weight: bold; z-index: 1000; }
        #app-screen { display: none; }
    </style>
</head>
<body>
    <div id="toast"></div>

    <div id="auth-screen">
        <div class="card">
            <h1 style="color: var(--accent)">LGBTcoin</h1>
            <p>Стартирай копаенето сега</p>
            <input type="text" id="name" placeholder="Име">
            <input type="tel" id="phone">
            <input type="password" id="pass" placeholder="Парола">
            <button class="btn" onclick="handleAuth()">ВХОД / РЕГИСТРАЦИЯ</button>
        </div>
    </div>

    <div id="app-screen">
        <div class="card">
            <h2 id="user-name">Здравей!</h2>
            <div style="font-size: 45px; margin: 20px 0; color: var(--accent); font-weight: bold;" id="bal">0.0000</div>
            <button class="btn" id="mine-btn" onclick="startMining()">START MINING</button>
            <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer;">Изход</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9_ZIz7D59Z-fooXVcUOffzEdWCQR3X2o",
            authDomain: "lgbtcoineu.firebaseapp.com",
            databaseURL: "https://lgbtcoineu-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lgbtcoineu",
            storageBucket: "lgbtcoineu.firebasestorage.app",
            messagingSenderId: "381272855019",
            appId: "1:381272855019:web:20ef2cbcea82c2c65f89ae"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const phoneInput = document.querySelector("#phone");
        const iti = window.intlTelInput(phoneInput, { initialCountry: "bg", separateDialCode: true });

        window.showToast = (msg) => {
            const t = document.getElementById("toast");
            t.innerText = msg; t.style.display = "block";
            setTimeout(() => t.style.display = "none", 3000);
        };

        window.handleAuth = async () => {
            const name = document.getElementById('name').value;
            const pass = document.getElementById('pass').value;
            const phone = iti.getNumber().replace('+', '');

            if (!name || !pass || phone.length < 5) {
                showToast("Моля, попълнете всички полета!");
                return;
            }

            const userRef = ref(db, 'users/' + phone);
            const snap = await get(userRef);

            if (!snap.exists()) {
                await set(userRef, { name, password: pass, balance: 0 });
            } else if (snap.val().password !== pass) {
                showToast("Грешна парола!");
                return;
            }

            localStorage.setItem("userPhone", phone);
            location.reload();
        };

        const savedPhone = localStorage.getItem("userPhone");
        if (savedPhone) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            onValue(ref(db, 'users/' + savedPhone), (s) => {
                if(s.exists()){
                    document.getElementById('user-name').innerText = "Здравей, " + s.val().name;
                    document.getElementById('bal').innerText = s.val().balance.toFixed(4);
                }
            });
        }

        window.startMining = () => {
            document.getElementById('mine-btn').innerText = "MINING...";
            showToast("Започнахте да печелите!");
            setInterval(() => {
                let b = parseFloat(document.getElementById('bal').innerText);
                b += 0.0001;
                document.getElementById('bal').innerText = b.toFixed(4);
                update(ref(db, 'users/' + savedPhone), { balance: b });
            }, 10000);
        };
    </script>
</body>
</html>
