<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGBTcoin - Belgium Node</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --accent: #00ff88; --text: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); text-align: center; padding: 20px; }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 25px; border-radius: 30px; display: none; z-index: 1000; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        .auth-card { background: #111; padding: 30px; border-radius: 25px; margin-top: 50px; border: 1px solid #222; max-width: 400px; margin-left: auto; margin-right: auto; }
        input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; outline: none; }
        input:focus { border-color: var(--accent); }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: var(--accent); color: #000; font-weight: 900; cursor: pointer; font-size: 16px; text-transform: uppercase; }
        .btn:active { transform: scale(0.97); }

        #main-app { display: none; padding-top: 20px; }
        .balance-display { font-size: 50px; font-weight: 900; color: var(--accent); margin: 30px 0; text-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .mining-btn { width: 100%; height: 120px; background: #111; border: 2px solid #222; border-radius: 20px; color: var(--accent); font-size: 24px; font-weight: 900; cursor: pointer; margin-bottom: 20px; }
        .mining-btn.active { border-color: var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 10px var(--accent); } 50% { box-shadow: 0 0 30px var(--accent); } 100% { box-shadow: 0 0 10px var(--accent); } }
    </style>
</head>
<body>
    <div id="toast"></div>

    <div id="screen-auth">
        <div class="auth-card">
            <h1 style="margin-bottom: 10px; font-size: 35px;">LGBTcoin</h1>
            <p style="color: #666; margin-bottom: 25px;">Cloud Mining - Europe West</p>
            <input type="text" id="reg-name" placeholder="Твоето име">
            <input type="tel" id="reg-phone">
            <input type="password" id="reg-pass" placeholder="Парола">
            <button class="btn" onclick="handleAuth()">ВХОД / РЕГИСТРАЦИЯ</button>
        </div>
    </div>

    <div id="screen-app">
        <h2 id="user-greeting" style="margin-bottom: 10px;">Здравей!</h2>
        <div class="balance-display" id="main-bal">0.0000</div>
        <p style="color: #666; margin-bottom: 30px;">LGBT COINS AVAILABLE</p>
        
        <button class="mining-btn" id="mine-btn" onclick="startMining()">START MINING</button>
        
        <div style="background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222;">
            <p style="font-size: 12px; color: #555; margin-bottom: 5px;">ВАШИЯТ TON АДРЕС:</p>
            <code style="font-size: 11px; color: var(--accent); word-break: break-all;">UQCuIUIrH59P3BhCYSXiQEp8abCk3Hx83M1JH95wrdhh-Z4C</code>
        </div>

        <button onclick="logout()" style="margin-top: 30px; background: none; border: none; color: #444; font-weight: bold; cursor: pointer;">ИЗХОД</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        // КОНФИГУРАЦИЯ ЗА БЕЛГИЯ (EUROPE-WEST1)
        const firebaseConfig = {
            apiKey: "AIzaSyD9_ZIz7D59Z-fooXVcUOffzEdWCQR3X2o",
            authDomain: "lgbtcoineu.firebaseapp.com",
            databaseURL: "https://lgbtcoineu-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lgbtcoineu",
            storageBucket: "lgbtcoineu.firebasestorage.app",
            messagingSenderId: "381272855019",
            appId: "1:381272855019:web:20ef2cbcea82c2c65f89ae"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let userPhone = localStorage.getItem("u_phone");
        const phoneInput = document.querySelector("#reg-phone");
        const iti = window.intlTelInput(phoneInput, { initialCountry: "bg", separateDialCode: true });

        window.showToast = (m) => {
            const t = document.getElementById("toast");
            t.innerText = m; t.style.display = "block";
            setTimeout(() => t.style.display = "none", 3000);
        };

        // Вход и Регистрация
        window.handleAuth = async () => {
            const name = document.getElementById('reg-name').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const phone = iti.getNumber().replace('+', '');

            if (name.length < 2 || phone.length < 6 || pass.length < 4) {
                showToast("Моля, попълнете правилно!");
                return;
            }

            const userRef = ref(db, 'users/' + phone);
            try {
                const snap = await get(userRef);

                if (!snap.exists()) {
                    await set(userRef, { name, phone, password: pass, balance: 0, speed: 5 });
                } else if (snap.val().password !== pass) {
                    showToast("Грешна парола!");
                    return;
                }

                localStorage.setItem("u_phone", phone);
                location.reload();
            } catch (e) {
                showToast("Грешка при свързване с Белгия!");
            }
        };

        // Ако потребителят е влязъл
        if (userPhone) {
            document.getElementById('screen-auth').style.display = 'none';
            document.getElementById('screen-app').style.display = 'block';
            
            onValue(ref(db, 'users/' + userPhone), (s) => {
                const d = s.val();
                if(d) {
                    document.getElementById('user-greeting').innerText = "Здравей, " + d.name + "!";
                    document.getElementById('main-bal').innerText = d.balance.toFixed(4);
                }
            });
        }

        // Майнинг логика
        window.startMining = () => {
            const btn = document.getElementById('mine-btn');
            btn.classList.add('active');
            btn.innerText = "MINING IN PROGRESS...";
            showToast("Машините стартираха!");

            setInterval(async () => {
                let currentBal = parseFloat(document.getElementById('main-bal').innerText);
                currentBal += 0.0001;
                document.getElementById('main-bal').innerText = currentBal.toFixed(4);
                
                // Запис в базата на всеки 5 секунди
                update(ref(db, 'users/' + userPhone), { balance: currentBal });
            }, 5000);
        };

        window.logout = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
