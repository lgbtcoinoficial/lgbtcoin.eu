<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGBTcoin Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --black: #000000;
            --white: #ffffff;
            /* ЛГБТ Градиент за фона */
            --rainbow: linear-gradient(180deg, #ff0000 0%, #ff8d00 15%, #ffee00 31%, #008121 47%, #004cff 63%, #760089 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        /* ЕКРАН ЛОГИН СЪС ЗНАМЕ */
        #page-auth { 
            height: 100vh;
            background: var(--rainbow);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .login-box h1 { color: var(--black); font-weight: 900; font-size: 32px; margin-bottom: 20px; }

        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            border: 2px solid #eee; 
            font-size: 16px;
            outline: none;
        }

        /* ЧЕРЕН БУТОН */
        .btn-black { 
            width: 100%; 
            padding: 16px; 
            background: var(--black); 
            color: var(--white); 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer;
            font-size: 16px;
        }

        /* ВЪТРЕШЕН ЕКРАН (APP) */
        #main-ui { display: none; background: #f9f9f9; min-height: 100vh; color: var(--black); }
        .page { display: none; padding: 25px; padding-bottom: 100px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #fff; }
        
        .balance-card { 
            background: var(--black); 
            color: var(--white); 
            padding: 40px 20px; 
            border-radius: 25px; 
            text-align: center; 
            margin: 20px 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .balance-card h2 { font-size: 48px; font-weight: 900; }

        .mine-btn { 
            width: 100%; 
            height: 80px; 
            background: #fff; 
            border: 3px solid var(--black); 
            color: var(--black); 
            font-weight: 900; 
            font-size: 20px; 
            border-radius: 20px;
            cursor: pointer;
        }
        .mine-btn.active { background: var(--black); color: var(--white); }

        /* НАВИГАЦИЯ */
        .nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; 
            background: #fff; border-top: 1px solid #eee; 
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item { color: #ccc; text-align: center; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--black); }
        .nav-item i { font-size: 22px; }
        .nav-item span { display: block; font-size: 10px; font-weight: 800; margin-top: 4px; }

        .list-item { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #eee; display: flex; justify-content: space-between; font-weight: 600; }
    </style>
</head>
<body>

    <div id="page-auth">
        <div class="login-box">
            <h1>LGBTcoin</h1>
            <input type="text" id="reg-name" placeholder="Име">
            <input type="tel" id="reg-phone" placeholder="Телефон">
            <input type="password" id="reg-pass" placeholder="Парола">
            <button class="btn-black" onclick="handleAuth()">Вход / Регистрация</button>
        </div>
    </div>

    <div id="main-ui">
        <div class="header">
            <b id="u-name" style="font-size: 18px;">Потребител</b>
            <i class="fas fa-power-off" onclick="logout()" style="color:red; cursor:pointer;"></i>
        </div>

        <div id="page-mining" class="page active">
            <div class="balance-card">
                <small style="opacity: 0.7; letter-spacing: 2px;">ВАШИЯТ БАЛАНС</small>
                <h2 id="bal">0.0000</h2>
                <p>LGBT COINS</p>
            </div>
            <button class="mine-btn" id="mbtn" onclick="startMining()">START MINING</button>
        </div>

        <div id="page-wallet" class="page">
            <h2>Wallet</h2>
            <div class="balance-card">
                <small>Стойност в USD</small>
                <h2 id="usd-val">$0.00</h2>
            </div>
            <div class="list-item" style="font-size: 11px; word-break: break-all;">
                UQCuIUIrH59P3BhCYSXiQEp8abCk3Hx83M1JH95wrdhh-Z4C
            </div>
        </div>

        <div id="page-market" class="page">
            <h2>Market</h2>
            <div class="list-item"><span>LGBTcoin</span><span style="color:green">$0.42</span></div>
            <div class="list-item"><span>Bitcoin</span><span>$67,400</span></div>
            <div class="list-item"><span>TON</span><span>$7.10</span></div>
        </div>

        <div id="page-settings" class="page">
            <h2>Settings</h2>
            <div class="list-item" onclick="logout()"><span>Изход</span><i class="fas fa-chevron-right"></i></div>
            <div class="list-item"><span>Версия</span><span>1.1.0</span></div>
        </div>

        <nav class="nav">
            <div class="nav-item active" onclick="nav('mining')"><i class="fas fa-hammer"></i><span>Mining</span></div>
            <div class="nav-item" onclick="nav('market')"><i class="fas fa-chart-line"></i><span>Market</span></div>
            <div class="nav-item" onclick="nav('wallet')"><i class="fas fa-wallet"></i><span>Wallet</span></div>
            <div class="nav-item" onclick="nav('settings')"><i class="fas fa-cog"></i><span>Settings</span></div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9_ZIz7D59Z-fooXVcUOffzEdWCQR3X2o",
            authDomain: "lgbtcoineu.firebaseapp.com",
            databaseURL: "https://lgbtcoineu-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lgbtcoineu",
            appId: "1:381272855019:web:20ef2cbcea82c2c65f89ae"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.nav = (name) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + name).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        window.handleAuth = async () => {
            const n = document.getElementById('reg-name').value;
            const p = document.getElementById('reg-phone').value.trim();
            const pw = document.getElementById('reg-pass').value;

            if(!n || !p || !pw) return alert("Попълни всичко!");
            const uRef = ref(db, 'users/' + p);
            const snap = await get(uRef);
            if(!snap.exists()) {
                await set(uRef, { name: n, balance: 0, pass: pw });
            } else if(snap.val().pass !== pw) {
                return alert("Грешна парола!");
            }
            localStorage.setItem("user", p);
            location.reload();
        };

        const user = localStorage.getItem("user");
        if(user) {
            document.getElementById('page-auth').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            onValue(ref(db, 'users/' + user), (s) => {
                if(s.exists()){
                    const d = s.val();
                    document.getElementById('u-name').innerText = d.name;
                    document.getElementById('bal').innerText = (d.balance || 0).toFixed(4);
                    document.getElementById('usd-val').innerText = "$" + ((d.balance || 0) * 0.42).toFixed(2);
                }
            });
        }

        window.startMining = () => {
            const btn = document.getElementById('mbtn');
            btn.classList.add('active');
            btn.innerText = "MINING...";
            setInterval(() => {
                let current = parseFloat(document.getElementById('bal').innerText);
                update(ref(db, 'users/' + user), { balance: current + 0.0001 });
            }, 5000);
        };

        window.logout = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
